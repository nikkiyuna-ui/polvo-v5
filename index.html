<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polvo V5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── TOOLBAR ── -->
  <header id="toolbar">
    <div class="toolbar-left">
      <div id="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="16" cy="13" rx="7" ry="7.5" fill="currentColor" opacity=".18"/>
          <ellipse cx="16" cy="13" rx="5" ry="5.5" fill="currentColor"/>
          <circle cx="13.8" cy="11.5" r="1.3" fill="white"/>
          <circle cx="18.2" cy="11.5" r="1.3" fill="white"/>
          <path d="M9 19 Q6.5 24 7.5 28.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M11.5 21 Q10 26.5 12 30" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M14.5 22 Q14 27.5 16 30" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M17.5 22 Q18 27.5 16 30" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M20.5 21 Q22 26.5 20 30" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M23 19 Q25.5 24 24.5 28.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        </svg>
        <span>Polvo</span>
        <span class="logo-version">V5</span>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn today-btn" id="btn-hoje">Hoje</button>
      <button class="toolbar-btn" id="btn-members">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Membros
      </button>
      <button class="toolbar-btn" id="btn-projects">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
        </svg>
        Projetos
      </button>
    </div>
  </header>

  <!-- ── BOARD ── -->
  <div id="board-wrapper">
    <div id="board"></div>
  </div>

  <!-- ── TRASH ZONE ── -->
  <div id="trash-zone">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
    <span>Soltar para apagar</span>
  </div>

  <!-- ── OVERLAY ── -->
  <div class="modal-overlay hidden" id="overlay"></div>

  <!-- ── MODAL: MEMBROS ── -->
  <div class="modal hidden" id="modal-members">
    <div class="modal-header">
      <h2>Membros</h2>
      <button class="modal-close" id="close-members">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="11" y2="11"/><line x1="11" y1="2" x2="2" y2="11"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="members-list"></div>
    <div class="modal-footer">
      <button class="btn-add-item" id="add-member-btn">+ Adicionar Membro</button>
    </div>
  </div>

  <!-- ── MODAL: PROJETOS ── -->
  <div class="modal hidden" id="modal-projects">
    <div class="modal-header">
      <h2>Projetos</h2>
      <button class="modal-close" id="close-projects">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="11" y2="11"/><line x1="11" y1="2" x2="2" y2="11"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="projects-list"></div>
    <div class="modal-footer">
      <button class="btn-add-item" id="add-project-btn">+ Adicionar Projeto</button>
    </div>
  </div>

  <!-- ── MODAL: NOVO CARD ── -->
  <div class="modal hidden" id="modal-new-card">
    <div class="modal-header">
      <h2>Novo Card</h2>
      <button class="modal-close" id="close-new-card">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="11" y2="11"/><line x1="11" y1="2" x2="2" y2="11"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nome da atividade</label>
        <input type="text" id="new-card-name" placeholder="Descreva a atividade…" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Projeto</label>
        <select id="new-card-project"></select>
      </div>
      <div class="form-group">
        <label>Responsáveis</label>
        <div id="new-card-members"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" id="create-card-btn">Criar Card</button>
    </div>
  </div>

</div>
<script type="module" src="app.js"></script>
</body>
</html>
